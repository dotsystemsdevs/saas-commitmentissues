name: Good first issue
description: Small scoped task for new contributors.
title: "good first issue: "
labels:
  - good first issue
  - help wanted
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the exact expected output.
      placeholder: Auto-clean pasted GitHub URL input and strip protocol.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - Input accepts full URL and owner/repo format
        - Invalid URLs show a clear error
        - Existing behavior remains unchanged
    validations:
      required: true
